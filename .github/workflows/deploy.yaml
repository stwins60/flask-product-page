name: Build and Deploy Product Page

on:
  push:
    branches:
      - dev

env:
  DOCKERHUB_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/product-page

jobs:
  build:
    name: Build and Push Image
    runs-on: self-hosted

    outputs:
      image_name: ${{ steps.image.outputs.image_name }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Set image tag
        id: image
        shell: bash
        run: |
          echo "image_name=${DOCKERHUB_IMAGE}:${GITHUB_SHA}" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.output.image_name }}
            $ {{ env.DOCKERHUB_IMAGE }}:dev
          cache-from: type=gha
          cache-to: type:gha,mode=max