name: Build and Deploy Product Page

on:
  push:
    branches:
      - dev

env:
  DOCKERHUB_IMAGE: idrisniyi94/product-page

jobs:
  build:
    name: Build and Push Image
    runs-on: self-hosted

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
        with:
          driver: docker-container

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKERHUB_IMAGE }}:${{ github.sha }}
            ${{ env.DOCKERHUB_IMAGE }}:dev
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to dev
    needs: build
    runs-on: self-hosted

    env:
      IMAGE_NAME: idrisniyi94/product-page:${{ github.sha }}
      CLOUDFLARE_TUNNEL_TOKEN: ${{ secrets.CLOUDFLARE_TUNNEL_TOKEN }}
    
    steps:
      - name: Checkout deployment files
        uses: actions/checkout@v4
      
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull and deploy application
        run: |
          docker compose pull
          docker compose up -d --no-build --remove-orphans
